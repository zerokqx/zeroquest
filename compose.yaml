include:
  - "./libs/db/compose.yaml"
services:
  zeroquest:
    build:
      context: .
      dockerfile: ./apps/zeroquest/Dockerfile
      network: host
    networks:
      - insight-network
    ports:
      - "127.0.0.1:4200:4200"
    env_file: ./.env
    environment:
      HOST: 0.0.0.0
      PORT: 4200
      API_ORIGIN: http://api:4000
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
      network: host
    networks:
      - insight-network
      - db
    ports:
      - "127.0.0.1:4000:4000"
    env_file: ./.env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-zeroquest}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password_here}
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-strong_password_here}@postgres:5432/${POSTGRES_DB:-zeroquest}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
      - postgres
  nginx:
    image: nginx:alpine
    network_mode: "host"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  redis:
    networks:
      - insight-network
    image: redis:7
    container_name: zeroquest_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-5102}:6379"
      - "127.0.0.1:5540:5540"
    volumes:
      - redis_data:/data
  redisinsight:
    image: redis/redisinsight:latest
    network_mode: "service:redis"
    container_name: zeroquest_redisinsight
    depends_on:
      - redis
    restart: unless-stopped
volumes:
  redis_data:
networks:
  insight-network:
    driver: bridge
